<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">
            <tr>
              <td style="background:#0f172a;padding:24px 28px;">
                <h1 style="margin:0;font-size:24px;line-height:30px;color:#ffffff;">Welcome to PrimeLiving</h1>
                <p style="margin:8px 0 0;font-size:14px;line-height:20px;color:#cbd5e1;">Verify your email address</p>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <p style="margin:0 0 16px;font-size:15px;line-height:24px;">Hi {{ .Email }},</p>
                <p style="margin:0 0 16px;font-size:15px;line-height:24px;">
                  Please confirm your email to activate secure access to your PrimeLiving account.
                </p>

                <p style="margin:22px 0 24px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:8px;font-size:14px;font-weight:700;">
                    Verify Email
                  </a>
                </p>

                <p style="margin:0 0 10px;font-size:12px;line-height:18px;color:#64748b;">
                  If the button does not work, copy this link into your browser:
                </p>
                <p style="margin:0;word-break:break-all;font-size:12px;line-height:18px;color:#475569;">{{ .ConfirmationURL }}</p>
              </td>
            </tr>
            <tr>
              <td style="background:#f8fafc;border-top:1px solid #e2e8f0;padding:16px 28px;">
                <p style="margin:0;font-size:12px;line-height:18px;color:#64748b;">PrimeLiving Property Management</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
